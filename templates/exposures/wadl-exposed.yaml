id: wadl-exposed

info:
  name: WADL Documentation Exposed
  author: scan-nuclei
  severity: medium
  description: |
    Detects publicly accessible WADL resources such as application.wadl and
    related schemas, which disclose REST resource structure and operations.
  tags:
    - exposure
    - wadl
    - java
    - api
    - docs

http:
  - method: GET
    path:
      - "{{BaseURL}}/application.wadl"
      - "{{BaseURL}}/application.wadl?detail=true"
      - "{{BaseURL}}/application.wadl/xsd0.xsd"
      - "{{BaseURL}}/resources/application.wadl"
      - "{{BaseURL}}/resources/application.wadl?detail=true"
      - "{{BaseURL}}/resources/application.wadl/xsd0.xsd"

    extractors:
      - type: dsl
        name: exposed_path
        dsl:
          - trim_prefix(matched, host)

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "(?is)<application[^>]+xmlns\\s*=\\s*[\"']http://wadl\\.dev\\.java\\.net/2009/02[\"']"
          - "(?is)<resources\\b"
          - "(?is)<grammars\\b"
          - "(?is)<xs:schema\\b"
        condition: or
      - type: regex
        part: header
        regex:
          - "(?i)content-type:\\s*(application/xml|text/xml|application/xsd\\+xml|text/plain)"
