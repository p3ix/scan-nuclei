id: wadl-exposed

info:
  name: WADL Documentation Exposed
  author: scan-nuclei
  severity: medium
  description: |
    Detects publicly accessible WADL resources such as application.wadl and
    related schemas, which disclose REST resource structure and operations.
  tags:
    - exposure
    - wadl
    - java
    - api
    - docs

http:
  - method: GET
    path:
      - "{{BaseURL}}/application.wadl"
      - "{{BaseURL}}/application.wadl?detail=true"
      - "{{BaseURL}}/application.wadl/xsd0.xsd"
      - "{{BaseURL}}/rest/application.wadl"
      - "{{BaseURL}}/rest/application.wadl/"
      - "{{BaseURL}}/rest/application.wadl?detail=true"
      - "{{BaseURL}}/rest/application.wadl/xsd0.xsd"
      - "{{BaseURL}}/REST/application.wadl"
      - "{{BaseURL}}/api/application.wadl"
      - "{{BaseURL}}/api/application.wadl?detail=true"
      - "{{BaseURL}}/api/application.wadl/xsd0.xsd"
      - "{{BaseURL}}/api/rest/application.wadl"
      - "{{BaseURL}}/api/rest/application.wadl?detail=true"
      - "{{BaseURL}}/services/application.wadl"
      - "{{BaseURL}}/services/application.wadl?detail=true"
      - "{{BaseURL}}/resources/application.wadl"
      - "{{BaseURL}}/resources/application.wadl?detail=true"
      - "{{BaseURL}}/resources/application.wadl/xsd0.xsd"
      - "{{BaseURL}}/webresources/application.wadl"
      - "{{BaseURL}}/webresources/application.wadl?detail=true"

    extractors:
      - type: dsl
        name: exposed_path
        dsl:
          - trim_prefix(matched, host)

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - "(?is)<application[^>]+xmlns\\s*=\\s*[\"']https?://wadl\\.dev\\.java\\.net/2009/02[\"']"
          - "(?is)<wadl:application\\b"
          - "(?is)<resources\\b"
          - "(?is)<wadl:resources\\b"
          - "(?is)<grammars\\b"
          - "(?is)<wadl:grammars\\b"
          - "(?is)<xs:schema\\b"
          - "(?is)wadl\\.dev\\.java\\.net/2009/02"
        condition: or
      - type: regex
        part: header
        regex:
          - "(?i)content-type:\\s*(application/xml|text/xml|application/xsd\\+xml|application/vnd\\.sun\\.wadl\\+xml|application/.*xml|text/plain)"
