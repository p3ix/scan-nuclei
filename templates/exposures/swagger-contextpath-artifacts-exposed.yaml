id: swagger-contextpath-artifacts-exposed

info:
  name: OpenAPI Docs Exposed on Java Context Paths
  author: scan-nuclei
  severity: medium
  description: |
    Detects publicly exposed OpenAPI/Swagger specification endpoints under common
    Java application context paths. Focused on JSON docs to reduce overlap with
    dedicated Swagger assets/source-map templates.
  tags:
    - exposure
    - swagger
    - openapi
    - wadl
    - java
    - contextpath

http:
  - method: GET
    path:
      - "{{BaseURL}}/{{ctx}}/docs.json"
      - "{{BaseURL}}/{{ctx}}/v3/api-docs"
      - "{{BaseURL}}/{{ctx}}/v2/api-docs"

    payloads:
      ctx:
        - vesismin-ws
        - api
        - app
        - ws
        - rest
        - services
        - service
        - backend
        - portal
        - web
        - gateway
        - internal

    stop-at-first-match: true
    matchers-condition: or
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200 && (contains(body, \"\\\"openapi\\\"\") || contains(body, \"\\\"swagger\\\"\")) && contains(body, \"\\\"paths\\\"\") && (contains(to_lower(all_headers), \"application/json\") || contains(to_lower(all_headers), \"text/plain\"))"
      - type: dsl
        dsl:
          - "status_code == 200 && (contains(body, \"http://wadl.dev.java.net/2009/02\") || contains(body, \"<resources\") || contains(body, \"<grammars\") || contains(body, \"<xs:schema\")) && (contains(to_lower(all_headers), \"application/xml\") || contains(to_lower(all_headers), \"text/xml\") || contains(to_lower(all_headers), \"application/xsd+xml\") || contains(to_lower(all_headers), \"text/plain\"))"
