id: java-heapdump-endpoint-exposed

info:
  name: Java Heapdump Endpoint Exposed
  author: scan-nuclei
  severity: high
  description: |
    Detects publicly accessible Java heap dump endpoints that may disclose
    in-memory secrets, credentials, tokens, and application internals.
  tags:
    - exposure
    - java
    - diagnostics
    - heapdump
    - sensitive

http:
  - method: GET
    path:
      - "{{BaseURL}}/actuator/heapdump"
      - "{{BaseURL}}/heapdump"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: header
        regex:
          - "(?i)content-type:\\s*(application/octet-stream|application/x-java-heap-dump|application/zip)"
      - type: binary
        part: body
        binary:
          - "4A4156412050524F46494C4520312E302E32"

    extractors:
      - type: dsl
        dsl:
          - path
        name: exposed_path
