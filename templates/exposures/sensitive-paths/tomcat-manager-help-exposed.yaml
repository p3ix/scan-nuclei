id: tomcat-manager-help-exposed

info:
  name: Tomcat Manager Help or UI Exposed
  author: scan-nuclei
  severity: medium
  description: |
    Detects exposed Tomcat Manager help or UI paths that reveal administrative
    capabilities and deployment-management surface.
  tags:
    - tomcat
    - exposure
    - manager
    - admin
    - hardening

http:
  - method: GET
    path:
      - "{{BaseURL}}/manager/"
      - "{{BaseURL}}/manager/html"
      - "{{BaseURL}}/manager/html/list"
      - "{{BaseURL}}/manager/html/help"

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200 || status_code == 401"
      - type: regex
        part: all
        condition: or
        regex:
          - "(?i)Tomcat Web Application Manager"
          - "(?i)Manager Help"
          - "(?i)List Applications"
          - "(?i)www-authenticate:\\s*basic\\s+realm=\"Tomcat Manager Application\""

    extractors:
      - type: dsl
        dsl:
          - path
        name: exposed_path
