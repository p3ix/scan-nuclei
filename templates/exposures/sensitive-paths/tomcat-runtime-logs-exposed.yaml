id: tomcat-runtime-logs-exposed

info:
  name: Tomcat Runtime Logs Exposed
  author: scan-nuclei
  severity: high
  description: |
    Detects exposed Tomcat runtime log files such as `catalina.out` or common
    Tomcat logs, which may leak stack traces, internal paths, deployed
    applications, usernames, connector details, and operational telemetry.
  tags:
    - tomcat
    - exposure
    - logs
    - sensitive
    - runtime

http:
  - method: GET
    path:
      - "{{BaseURL}}/logs/catalina.out"
      - "{{BaseURL}}/logs/catalina.log"
      - "{{BaseURL}}/logs/catalina.out.1"
      - "{{BaseURL}}/logs/catalina.out.2"
      - "{{BaseURL}}/logs/catalina.out.gz"
      - "{{BaseURL}}/logs/catalina.out.1.gz"
      - "{{BaseURL}}/logs/catalina.log.1"
      - "{{BaseURL}}/logs/catalina.log.2"
      - "{{BaseURL}}/logs/catalina.log.gz"
      - "{{BaseURL}}/logs/catalina.log.1.gz"
      - "{{BaseURL}}/logs/localhost.log"
      - "{{BaseURL}}/logs/localhost.log.1"
      - "{{BaseURL}}/logs/localhost.log.gz"
      - "{{BaseURL}}/logs/manager.log"
      - "{{BaseURL}}/logs/manager.log.1"
      - "{{BaseURL}}/logs/host-manager.log"
      - "{{BaseURL}}/logs/host-manager.log.1"
      - "{{BaseURL}}/logs/localhost_access_log.txt"
      - "{{BaseURL}}/logs/localhost_access_log.1.txt"
      - "{{BaseURL}}/logs/localhost_access_log.2026-04-29.txt"
      - "{{BaseURL}}/logs/localhost_access_log.2026-04-29.txt.gz"
      - "{{BaseURL}}/logs/access_log"
      - "{{BaseURL}}/logs/access_log.1"
      - "{{BaseURL}}/logs/access.log"
      - "{{BaseURL}}/logs/access.log.1"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)org\\.apache\\.catalina\\.startup\\.Catalina"
          - "(?i)Server startup in [0-9]+ ms"
          - "(?i)Initializing ProtocolHandler"
          - "(?i)INFO \\[[^\\]]+\\] org\\.apache\\.catalina"
          - "(?i)Apache Tomcat/[0-9.]+"
          - "(?i)localhost_access_log\\."
          - "(?i)GET /[^\\s]+ HTTP/1\\.[01]"
          - "(?i)POST /[^\\s]+ HTTP/1\\.[01]"
          - "(?i)\\[[0-9]{2}/[A-Za-z]{3}/[0-9]{4}:[0-9: +\\-]{8,}\\]"
          - "(?i)content-type:\\s*application/(gzip|x-gzip|octet-stream)"

    extractors:
      - type: dsl
        dsl:
          - path
        name: exposed_path
