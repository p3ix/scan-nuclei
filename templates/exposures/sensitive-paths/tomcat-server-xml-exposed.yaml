id: tomcat-server-xml-exposed

info:
  name: Tomcat Server XML Exposed
  author: scan-nuclei
  severity: high
  description: |
    Detects exposed Tomcat server.xml configuration that may disclose connector
    settings, realms, users, and internal deployment architecture.
  tags:
    - tomcat
    - exposure
    - sensitive
    - config

http:
  - method: GET
    path:
      - "{{BaseURL}}/conf/server.xml"
      - "{{BaseURL}}/server.xml"
      - "{{BaseURL}}/conf/server.xml.bak"
      - "{{BaseURL}}/conf/server.xml.old"
      - "{{BaseURL}}/conf/server.xml.orig"
      - "{{BaseURL}}/conf/server.xml.save"
      - "{{BaseURL}}/conf/server.xml.tmp"
      - "{{BaseURL}}/conf/server.xml~"
      - "{{BaseURL}}/server.xml.bak"
      - "{{BaseURL}}/server.xml.old"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        condition: or
        regex:
          - "(?is)<Server\\b"
          - "(?is)<Service\\b"
          - "(?is)<Connector\\b"
          - "(?is)<Engine\\b"
          - "(?is)<Realm\\b"
          - "(?is)<Host\\b"
          - "(?i)(AJP/1\\.3|SSLEnabled|keystore(File|Pass)|truststore(File|Pass)|scheme\\s*=\\s*\"https\")"

    extractors:
      - type: dsl
        dsl:
          - path
        name: exposed_path
