id: jboss-invoker-servlet-exposed

info:
  name: JBoss Invoker Servlet Exposed
  author: scan-nuclei
  severity: high
  description: |
    Detects exposed legacy JBoss invoker servlet endpoints associated with
    remote invocation and historical deserialization risk.
  tags:
    - exposure
    - jboss
    - invoker
    - servlet
    - deserialization
    - legacy

http:
  - method: GET
    path:
      - "{{BaseURL}}/invoker/JMXInvokerServlet"
      - "{{BaseURL}}/invoker/EJBInvokerServlet"
      - "{{BaseURL}}/invoker/readonly"

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200 || status_code == 401 || status_code == 403 || status_code == 500"
      - type: regex
        part: all
        condition: or
        regex:
          - "(?i)JMXInvokerServlet"
          - "(?i)EJBInvokerServlet"
          - "(?i)jboss"
          - "(?i)invoker"

    extractors:
      - type: dsl
        dsl:
          - path
        name: exposed_path
