id: java-build-credentials-exposed

info:
  name: Java Build Tool Credentials Exposed
  author: scan-nuclei
  severity: high
  description: |
    Detects exposed Maven and Gradle credential/configuration files. These can
    disclose repository credentials, signing keys, deployment endpoints, proxy
    settings, and internal artifact repositories.
  tags:
    - exposure
    - java
    - maven
    - gradle
    - credentials
    - supply-chain
    - sensitive

http:
  - method: GET
    path:
      - "{{BaseURL}}/settings.xml"
      - "{{BaseURL}}/.m2/settings.xml"
      - "{{BaseURL}}/m2/settings.xml"
      - "{{BaseURL}}/settings-security.xml"
      - "{{BaseURL}}/.m2/settings-security.xml"
      - "{{BaseURL}}/gradle.properties"
      - "{{BaseURL}}/.gradle/gradle.properties"
      - "{{BaseURL}}/config/gradle.properties"
      - "{{BaseURL}}/init.gradle"
      - "{{BaseURL}}/init.gradle.kts"
      - "{{BaseURL}}/WEB-INF/classes/settings.xml"
      - "{{BaseURL}}/WEB-INF/classes/gradle.properties"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        condition: or
        regex:
          - "(?is)<settings\\b[^>]*>.*<(servers|mirrors|profiles|proxies)>"
          - "(?is)<settingsSecurity\\b[^>]*>.*<(master|relocation)>"
          - "(?im)^(systemProp\\.|org\\.gradle\\.|maven\\.|signing\\.|nexus\\.|repo\\.)"
          - "(?im)^(ossrhUsername|ossrhPassword|mavenUser|mavenPassword|repositoryUser|repositoryPassword)\\s*="
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)(password|passphrase|username|credential|secret|token|privateKey|signing\\.keyId)"
          - "(?i)(repository|server|mirror|distributionManagement|nexus|artifactory)"
      - type: regex
        part: header
        regex:
          - "(?i)content-type:\\s*(application/xml|text/xml|text/plain|application/octet-stream)"

    extractors:
      - type: dsl
        dsl:
          - path
        name: exposed_path
