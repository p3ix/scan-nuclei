id: java-keystore-truststore-exposed

info:
  name: Java Keystore or Truststore Exposed
  author: scan-nuclei
  severity: high
  description: |
    Detects publicly accessible Java keystore/truststore files (JKS, P12, PFX),
    which may expose private keys or trusted certificate material.
  tags:
    - exposure
    - java
    - keystore
    - truststore
    - tls
    - secrets

http:
  - method: GET
    path:
      - "{{BaseURL}}/keystore.jks"
      - "{{BaseURL}}/truststore.jks"
      - "{{BaseURL}}/server.jks"
      - "{{BaseURL}}/application.keystore"
      - "{{BaseURL}}/application.truststore"
      - "{{BaseURL}}/ssl/keystore.jks"
      - "{{BaseURL}}/ssl/truststore.jks"
      - "{{BaseURL}}/certs/keystore.jks"
      - "{{BaseURL}}/certs/truststore.jks"
      - "{{BaseURL}}/standalone/configuration/application.keystore"
      - "{{BaseURL}}/standalone/configuration/application.truststore"
      - "{{BaseURL}}/standalone/configuration/keystore.jks"
      - "{{BaseURL}}/standalone/configuration/truststore.jks"
      - "{{BaseURL}}/domain/configuration/application.keystore"
      - "{{BaseURL}}/domain/configuration/application.truststore"
      - "{{BaseURL}}/domain/configuration/keystore.jks"
      - "{{BaseURL}}/domain/configuration/truststore.jks"
      - "{{BaseURL}}/keystore.p12"
      - "{{BaseURL}}/truststore.p12"
      - "{{BaseURL}}/server.p12"
      - "{{BaseURL}}/keystore.pfx"
      - "{{BaseURL}}/server.pfx"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: binary
        binary:
          - "FEEDFEED"
          - "3082"
        condition: or
      - type: regex
        part: header
        regex:
          - "(?i)(content-type:.*(application/octet-stream|application/x-java-keystore|application/pkcs12)|content-disposition:.*(keystore|truststore|application\\.keystore|application\\.truststore|\\.jks|\\.p12|\\.pfx))"
