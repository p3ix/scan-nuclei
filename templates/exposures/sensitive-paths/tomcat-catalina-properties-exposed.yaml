id: tomcat-catalina-properties-exposed

info:
  name: Tomcat Catalina Properties Exposed
  author: scan-nuclei
  severity: medium
  description: |
    Detects exposed catalina.properties files leaking runtime classpath, package
    access/security settings, and Tomcat internals.
  tags:
    - tomcat
    - exposure
    - properties
    - config

http:
  - method: GET
    path:
      - "{{BaseURL}}/conf/catalina.properties"
      - "{{BaseURL}}/catalina.properties"
      - "{{BaseURL}}/conf/catalina.properties.bak"
      - "{{BaseURL}}/conf/catalina.properties~"
      - "{{BaseURL}}/conf/catalina.properties.old"
      - "{{BaseURL}}/conf/catalina.properties.orig"
      - "{{BaseURL}}/conf/catalina.properties.save"
      - "{{BaseURL}}/conf/catalina.properties.tmp"
      - "{{BaseURL}}/conf/catalina.properties.swp"
      - "{{BaseURL}}/catalina.properties.bak"
      - "{{BaseURL}}/catalina.properties~"
      - "{{BaseURL}}/catalina.properties.old"
      - "{{BaseURL}}/catalina.properties.orig"
      - "{{BaseURL}}/catalina.properties.save"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        condition: or
        regex:
          - "(?im)^common\\.loader\\s*="
          - "(?im)^server\\.loader\\s*="
          - "(?im)^package\\.access\\s*="
          - "(?im)^package\\.definition\\s*="
