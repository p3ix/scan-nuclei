id: tomcat-users-xml-exposed

info:
  name: Tomcat Users XML Exposed
  author: scan-nuclei
  severity: high
  description: |
    Detects exposed `tomcat-users.xml` and common backup variants, potentially
    disclosing administrative usernames, roles, and legacy in-file credential
    mappings used by Tomcat Manager, Host Manager, or custom realms.
  tags:
    - tomcat
    - exposure
    - sensitive
    - credentials

http:
  - method: GET
    path:
      - "{{BaseURL}}/conf/tomcat-users.xml"
      - "{{BaseURL}}/tomcat-users.xml"
      - "{{BaseURL}}/conf/tomcat-users.xml.bak"
      - "{{BaseURL}}/conf/tomcat-users.xml.old"
      - "{{BaseURL}}/conf/tomcat-users.xml.orig"
      - "{{BaseURL}}/conf/tomcat-users.xml.save"
      - "{{BaseURL}}/conf/tomcat-users.xml.tmp"
      - "{{BaseURL}}/conf/tomcat-users.xml~"
      - "{{BaseURL}}/tomcat-users.xml.bak"
      - "{{BaseURL}}/tomcat-users.xml.old"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        condition: or
        regex:
          - "(?is)<tomcat-users\\b"
          - "(?is)<user\\b[^>]*\\busername\\s*="
          - "(?is)<role\\b[^>]*\\brolename\\s*="
          - "(?i)(manager-(gui|script|jmx|status)|admin-(gui|script))"
          - "(?i)(MemoryUserDatabase|UserDatabaseRealm|org\\.apache\\.catalina\\.users\\.MemoryUserDatabase)"

    extractors:
      - type: dsl
        dsl:
          - path
        name: exposed_path
