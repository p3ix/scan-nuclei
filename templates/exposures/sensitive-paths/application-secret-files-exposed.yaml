id: application-secret-files-exposed

info:
  name: Java Application Secret Files Exposed
  author: scan-nuclei
  severity: high
  description: Detects direct access to secret-like files used by Java/Spring deployments.
  tags:
    - exposure
    - java
    - spring
    - secrets

http:
  - method: GET
    path:
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.env.production"
      - "{{BaseURL}}/.env.staging"
      - "{{BaseURL}}/secrets.properties"
      - "{{BaseURL}}/config/secrets.properties"
      - "{{BaseURL}}/application-secrets.properties"
      - "{{BaseURL}}/config/application-secrets.properties"

    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: regex
        part: body
        condition: or
        regex:
          - "(?im)(password|passwd|secret|token|apikey|api_key|jdbc:)\\s*[:=]"
          - "(?im)^SPRING_[A-Z0-9_]+="
          - "(?im)^DB_(USER|PASSWORD|HOST)="

    extractors:
      - type: dsl
        dsl: [path]
        name: exposed_path
