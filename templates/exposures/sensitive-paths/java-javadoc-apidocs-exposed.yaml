id: java-javadoc-apidocs-exposed

info:
  name: Java Javadoc API Documentation Exposed
  author: scan-nuclei
  severity: low
  description: |
    Detects exposed generated Java API documentation. Javadoc can disclose
    internal package names, class structure, method signatures, comments,
    deprecated endpoints, and implementation details useful for reconnaissance.
  tags:
    - exposure
    - java
    - javadoc
    - documentation
    - source-code

http:
  - method: GET
    path:
      - "{{BaseURL}}/javadoc/"
      - "{{BaseURL}}/javadoc/index.html"
      - "{{BaseURL}}/apidocs/"
      - "{{BaseURL}}/apidocs/index.html"
      - "{{BaseURL}}/api-docs/"
      - "{{BaseURL}}/api-docs/index.html"
      - "{{BaseURL}}/target/site/apidocs/index.html"
      - "{{BaseURL}}/build/docs/javadoc/index.html"
      - "{{BaseURL}}/docs/javadoc/index.html"
      - "{{BaseURL}}/docs/apidocs/index.html"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)<title>.*(Javadoc|API Documentation|Overview)"
          - "(?i)Generated by javadoc"
          - "(?i)All Classes and Interfaces"
          - "(?i)Package Summary"
          - "(?i)class-use/"
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)(java\\.base|java\\.lang|javax\\.|jakarta\\.|org\\.springframework|org\\.apache)"
          - "(?i)(Method Summary|Constructor Summary|Field Summary|Deprecated)"
      - type: regex
        part: header
        regex:
          - "(?i)content-type:\\s*(text/html|text/plain)"

    extractors:
      - type: dsl
        dsl:
          - path
        name: exposed_path
