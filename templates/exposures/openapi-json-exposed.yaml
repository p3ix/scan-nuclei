id: openapi-json-exposed

info:
  name: OpenAPI JSON Exposed
  author: scan-nuclei
  severity: medium
  description: |
    Detects publicly accessible OpenAPI/Swagger JSON documents that disclose
    endpoint inventory, schemas, and API metadata.
  tags:
    - exposure
    - openapi
    - swagger
    - json
    - api

http:
  - method: GET
    path:
      - "{{BaseURL}}/swagger"
      - "{{BaseURL}}/openapi"
      - "{{BaseURL}}/v3/api-docs"
      - "{{BaseURL}}/v2/api-docs"
      - "{{BaseURL}}/api-docs"
      - "{{BaseURL}}/api-docs.json"
      - "{{BaseURL}}/openapi.json"
      - "{{BaseURL}}/swagger.json"
      - "{{BaseURL}}/api/openapi.json"
      - "{{BaseURL}}/api/swagger.json"
      - "{{BaseURL}}/api/v3/api-docs"
      - "{{BaseURL}}/api/v2/api-docs"
      - "{{BaseURL}}/api/api-docs"
      - "{{BaseURL}}/api/api-docs.json"
      - "{{BaseURL}}/docs.json"
      - "{{BaseURL}}/api/docs.json"
      - "{{BaseURL}}/docs/openapi.json"
      - "{{BaseURL}}/docs/swagger.json"
      - "{{BaseURL}}/swagger/v1/swagger.json"
      - "{{BaseURL}}/swagger/v2/swagger.json"
      - "{{BaseURL}}/swagger/v3/swagger.json"
      - "{{BaseURL}}/swagger/docs/v1"
      - "{{BaseURL}}/swagger/docs/v1.json"
      - "{{BaseURL}}/api/swagger/v1/swagger.json"
      - "{{BaseURL}}/api/swagger/v2/swagger.json"
      - "{{BaseURL}}/api/swagger/v3/swagger.json"
      - "{{BaseURL}}/openapi/v1.json"
      - "{{BaseURL}}/openapi/v2.json"
      - "{{BaseURL}}/openapi/v3.json"

    extractors:
      - type: dsl
        name: exposed_path
        dsl:
          - trim_prefix(matched, host)

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - '(?i)"(openapi|swagger)"\s*:\s*"[^"]+"'
      - type: regex
        part: body
        regex:
          - '(?i)"paths"\s*:\s*\{'
      - type: regex
        part: header
        regex:
          - "(?i)content-type:\\s*(application/json|application/vnd\\.oas\\.json|application/schema\\+json|text/plain)"
