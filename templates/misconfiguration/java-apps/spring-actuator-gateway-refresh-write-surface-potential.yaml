id: spring-actuator-gateway-refresh-write-surface-potential

info:
  name: Spring Actuator Gateway Refresh Write Surface Potentially Exposed
  author: scan-nuclei
  severity: medium
  description: |
    Detects a likely exposed Spring Cloud Gateway refresh actuator write surface
    without invoking the operation. A 405 response with POST allowed indicates
    the endpoint exists and should be protected.
  tags:
    - misconfig
    - spring
    - spring-cloud
    - actuator
    - gateway
    - write-surface
    - potential

http:
  - method: GET
    path:
      - "{{BaseURL}}/actuator/gateway/refresh"
      - "{{BaseURL}}/gateway/refresh"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 405
      - type: regex
        part: header
        regex:
          - "(?i)allow:\\s*(?:[^\\r\\n,]+,\\s*)*POST\\b"
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)request method '?GET'? not supported"
          - '(?i)"method"\s*:\s*"GET"'
          - '(?i)"path"\s*:\s*".*/gateway/refresh"'

    extractors:
      - type: dsl
        dsl:
          - path
        name: exposed_path
