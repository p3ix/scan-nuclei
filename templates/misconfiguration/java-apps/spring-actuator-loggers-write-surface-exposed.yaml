id: spring-actuator-loggers-write-surface-exposed

info:
  name: Spring Actuator Loggers Write Surface Exposed
  author: scan-nuclei
  severity: medium
  description: |
    Detects exposed actuator loggers write endpoints by probing unauthenticated
    POST handling behavior. This avoids relying on permissive OPTIONS responses
    that may appear on non-existent routes and cause false positives.
  tags:
    - misconfig
    - spring
    - actuator
    - loggers
    - write
    - exposure

http:
  - method: POST
    path:
      - "{{BaseURL}}/actuator/loggers/ROOT"
      - "{{BaseURL}}/loggers/ROOT"
      - "{{BaseURL}}/actuator/loggers/org.springframework"
      - "{{BaseURL}}/loggers/org.springframework"

    headers:
      Content-Type: application/json
      Accept: application/json

    body: "{"

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200 || status_code == 204 || status_code == 400 || status_code == 415"
      - type: regex
        part: all
        condition: or
        regex:
          - "(?i)application/(json|problem\\+json)"
          - '(?i)"(timestamp|status|error|path|message|configuredLevel|effectiveLevel)"'
          - "(?i)invalid\\s+json"
          - "(?i)http\\s+message\\s+not\\s+readable"
      - type: dsl
        dsl:
          - "!contains(to_lower(body), 'estado http 404')"
          - "!contains(to_lower(body), 'status 404')"
          - "!contains(to_lower(body), 'no encontrado')"
          - "!contains(to_lower(body), 'not found')"

    extractors:
      - type: dsl
        dsl:
          - path
        name: exposed_path
