id: spring-actuator-refresh-write-surface-potential

info:
  name: Spring Actuator Refresh Write Surface Potentially Exposed
  author: scan-nuclei
  severity: medium
  description: |
    Detects a likely exposed Spring Cloud refresh actuator write surface without
    invoking the refresh operation. A 405 response with POST allowed indicates
    the endpoint exists and should be disabled or strongly authenticated.
  tags:
    - misconfig
    - spring
    - spring-cloud
    - actuator
    - refresh
    - write-surface
    - potential

http:
  - method: GET
    path:
      - "{{BaseURL}}/actuator/refresh"
      - "{{BaseURL}}/refresh"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 405
      - type: regex
        part: header
        regex:
          - "(?i)allow:\\s*(?:[^\\r\\n,]+,\\s*)*POST\\b"
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)request method '?GET'? not supported"
          - '(?i)"method"\s*:\s*"GET"'
          - '(?i)"path"\s*:\s*".*/refresh"'

    extractors:
      - type: dsl
        dsl:
          - path
        name: exposed_path
