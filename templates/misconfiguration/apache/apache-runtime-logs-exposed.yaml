id: apache-runtime-logs-exposed

info:
  name: Apache Runtime Logs Exposed
  author: scan-nuclei
  severity: high
  description: |
    Detects exposed Apache access and error logs. Logs may disclose request
    history, credentials in URLs, internal paths, backend errors, client IPs,
    and exploit attempts.
  tags:
    - apache
    - httpd
    - logs
    - exposure
    - sensitive

http:
  - method: GET
    path:
      - "{{BaseURL}}/access.log"
      - "{{BaseURL}}/error.log"
      - "{{BaseURL}}/logs/access.log"
      - "{{BaseURL}}/logs/error.log"
      - "{{BaseURL}}/apache2/access.log"
      - "{{BaseURL}}/apache2/error.log"
      - "{{BaseURL}}/httpd/access_log"
      - "{{BaseURL}}/httpd/error_log"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        condition: or
        regex:
          - '(?m)^[0-9a-f:.]+\\s+-\\s+-\\s+\\[[0-9]{2}/[A-Za-z]{3}/[0-9]{4}:'
          - '(?m)^\\[[A-Za-z]{3}\\s+[A-Za-z]{3}\\s+[0-9]{1,2}\\s+[0-9:]{8}\\.?[0-9]*\\s+[0-9]{4}\\]\\s+\\[(error|warn|notice|info|debug)\\]'
          - "(?i)AH[0-9]{5}:"
          - "(?i)\\[client\\s+[0-9a-f:.]+"
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)Apache"
          - "(?i)mod_"
          - "(?i)AH[0-9]{5}"
          - "(?m)\"(GET|POST|PUT|DELETE|HEAD|OPTIONS)\\s+\\S+\\s+HTTP/"

    extractors:
      - type: dsl
        dsl:
          - path
        name: exposed_path
