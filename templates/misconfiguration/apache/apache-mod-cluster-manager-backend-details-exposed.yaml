id: apache-mod-cluster-manager-backend-details-exposed

info:
  name: Apache mod_cluster Manager Backend Details Exposed
  author: scan-nuclei
  severity: high
  description: |
    Detects exposed `mod_cluster` manager pages disclosing backend node names,
    balancer groups, routes, and application contexts. This adds actionable
    topology detail beyond the exposed manager panel itself.
  tags:
    - apache
    - misconfig
    - mod_cluster
    - proxy
    - backend
    - disclosure
    - admin

http:
  - method: GET
    path:
      - "{{BaseURL}}/mod_cluster_manager"
      - "{{BaseURL}}/mod-cluster-manager"
      - "{{BaseURL}}/mod_cluster-manager"
      - "{{BaseURL}}/modcluster-manager"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)mod_cluster Manager"
          - "(?i)LBGroup"
          - "(?i)Node Name"
          - "(?i)Balancer:"
          - "(?i)Contexts?"
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)Node Name"
          - "(?i)LBGroup"
          - "(?i)Balancer:"
          - "(?i)JVMRoute"
          - "(?i)Contexts?"

    extractors:
      - type: dsl
        dsl:
          - path
        name: exposed_path
      - type: regex
        part: body
        name: balancer_name
        regex:
          - "(?i)Balancer:\\s*([a-z0-9._-]+)"
      - type: regex
        part: body
        name: lbgroup
        regex:
          - "(?i)LBGroup\\s*(?:</[^>]+>\\s*)?[:=]?\\s*(?:<[^>]+>\\s*)?([a-z0-9._-]+)"
      - type: regex
        part: body
        name: node_name
        regex:
          - "(?i)Node Name\\s*(?:</[^>]+>\\s*)?[:=]?\\s*(?:<[^>]+>\\s*)?([a-z0-9._:-]+)"
      - type: regex
        part: body
        name: jvm_route
        regex:
          - "(?i)JVMRoute\\s*(?:</[^>]+>\\s*)?[:=]?\\s*(?:<[^>]+>\\s*)?([a-z0-9._-]+)"
      - type: regex
        part: body
        name: context
        regex:
          - "(?i)(/[a-z0-9._~/-]+)"
