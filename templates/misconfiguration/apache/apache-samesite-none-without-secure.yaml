id: apache-samesite-none-without-secure

info:
  name: Apache Frontend Cookie SameSite=None Without Secure
  author: scan-nuclei
  severity: medium
  description: |
    Detects frontend cookies where SameSite=None is set without Secure on
    Apache-served responses.
  tags:
    - apache
    - httpd
    - misconfig
    - cookie
    - session
    - headers
    - hardening

http:
  - method: GET
    path:
      - "{{BaseURL}}/"

    matchers-condition: and
    matchers:
      - type: regex
        part: header
        regex:
          - "(?i)^server:\\s*apache/?[0-9.]*"
      - type: dsl
        dsl:
          - "contains(to_lower(all_headers), 'samesite=none') && !contains(to_lower(all_headers), 'secure')"
