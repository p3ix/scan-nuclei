id: tomcat-manager-default-credentials

info:
  name: Apache Tomcat Manager Default Credentials
  author: scan-nuclei
  severity: high
  description: |
    Attempts common/default credentials against Tomcat Manager and Host Manager
    interfaces protected by HTTP Basic authentication.
  tags:
    - tomcat
    - manager
    - host-manager
    - default-login
    - basic-auth

http:
  - method: GET
    path:
      - "{{BaseURL}}/manager/html"
      - "{{BaseURL}}/host-manager/html"

    attack: pitchfork
    payloads:
      username:
        - tomcat
        - admin
        - manager
        - role1
        - both
      password:
        - tomcat
        - admin
        - manager
        - role1
        - both

    headers:
      Authorization: "Basic {{base64(username + ':' + password)}}"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)Tomcat Web Application Manager"
          - "(?i)Tomcat Virtual Host Manager"
      - type: word
        part: header
        words:
          - "text/html"
      - type: dsl
        dsl:
          - "!contains(to_lower(all_headers), 'www-authenticate')"
