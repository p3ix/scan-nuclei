id: cors-origin-reflection-with-credentials

info:
  name: CORS Origin Reflection with Credentials
  author: scan-nuclei
  severity: high
  description: |
    Detects reflected Origin combined with Access-Control-Allow-Credentials true,
    which can enable credentialed cross-origin data access.
  tags:
    - vulnerability
    - cors
    - headers
    - servlet
    - api

http:
  - method: OPTIONS
    path:
      - "{{BaseURL}}/"
      - "{{BaseURL}}/api/"
      - "{{BaseURL}}/v1/"

    headers:
      Origin: https://evil-origin.example
      Access-Control-Request-Method: GET

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 204
      - type: dsl
        dsl:
          - "contains(to_lower(all_headers), 'access-control-allow-origin: https://evil-origin.example')"
      - type: dsl
        dsl:
          - "contains(to_lower(all_headers), 'access-control-allow-credentials: true')"
