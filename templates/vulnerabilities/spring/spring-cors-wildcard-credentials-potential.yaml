id: spring-cors-wildcard-credentials-potential

info:
  name: Spring CORS Wildcard Origin with Credentials Potential
  author: scan-nuclei
  severity: medium
  description: |
    Detects potentially unsafe CORS behavior when a reflected/overly broad
    Access-Control-Allow-Origin is combined with Access-Control-Allow-Credentials.
  tags:
    - vulnerability
    - spring
    - cors
    - misconfig
    - api

http:
  - method: OPTIONS
    path:
      - "{{BaseURL}}/"
      - "{{BaseURL}}/api/"
      - "{{BaseURL}}/v1/"

    headers:
      Origin: https://evil.example
      Access-Control-Request-Method: GET

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 204
      - type: dsl
        dsl:
          - "contains(to_lower(all_headers), 'access-control-allow-credentials: true')"
      - type: dsl
        dsl:
          - "contains(to_lower(all_headers), 'access-control-allow-origin: https://evil.example') || contains(to_lower(all_headers), 'access-control-allow-origin: *')"
