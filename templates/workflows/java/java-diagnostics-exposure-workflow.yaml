id: java-diagnostics-exposure-workflow

info:
  name: Java Diagnostics Exposure Workflow
  author: scan-nuclei
  description: |
    Chains reusable Java diagnostics and configuration exposure checks after
    generic servlet-stack signals such as JSESSIONID cookies or recognizable
    servlet error pages.

workflows:
  - template: templates/technologies/java-web/jsessionid-cookie-fingerprint.yaml
    subtemplates:
      - template: templates/exposures/debug-probes/java-threaddump-endpoint-exposed.yaml
      - template: templates/exposures/debug-probes/java-heapdump-endpoint-exposed.yaml
      - template: templates/exposures/debug-probes/java-logfile-endpoint-exposed.yaml
      - template: templates/exposures/sensitive-paths/java-env-endpoint-exposed.yaml
      - template: templates/misconfiguration/java-apps/java-loggers-endpoint-exposed.yaml
      - template: templates/misconfiguration/java-apps/java-scheduledtasks-endpoint-exposed.yaml
  - template: templates/technologies/java-web/servlet-error-signature-fingerprint.yaml
    subtemplates:
      - template: templates/exposures/debug-probes/java-threaddump-endpoint-exposed.yaml
      - template: templates/exposures/debug-probes/java-heapdump-endpoint-exposed.yaml
      - template: templates/exposures/debug-probes/java-logfile-endpoint-exposed.yaml
      - template: templates/exposures/sensitive-paths/java-env-endpoint-exposed.yaml
      - template: templates/misconfiguration/java-apps/java-loggers-endpoint-exposed.yaml
      - template: templates/misconfiguration/java-apps/java-scheduledtasks-endpoint-exposed.yaml
