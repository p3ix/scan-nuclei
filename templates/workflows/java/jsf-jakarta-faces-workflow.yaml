id: jsf-jakarta-faces-workflow

info:
  name: JSF Jakarta Faces Workflow
  author: scan-nuclei
  description: |
    Chains JSF/Jakarta Faces fingerprints with descriptor, stacktrace, and
    reusable Java exposure checks.

workflows:
  - template: templates/technologies/java-web/jsf-jakarta-faces-fingerprint.yaml
    subtemplates:
      - template: templates/technologies/java-web/primefaces-resource-fingerprint.yaml
      - template: templates/exposures/sensitive-paths/jsf-faces-config-exposed.yaml
      - template: templates/exposures/sensitive-paths/jakarta-ee-descriptors-exposed.yaml
      - template: templates/exposures/sensitive-paths/web-inf-web-xml-exposed.yaml
      - template: templates/exposures/sensitive-paths/java-persistence-xml-exposed.yaml
      - template: templates/exposures/sensitive-paths/java-security-config-exposed.yaml
      - template: templates/exposures/error-pages/jakarta-faces-stacktrace-exposed.yaml
      - template: templates/exposures/debug-probes/java-threaddump-endpoint-exposed.yaml
      - template: templates/exposures/debug-probes/java-heapdump-endpoint-exposed.yaml
      - template: templates/vulnerabilities/generic-servlets/jsessionid-missing-secure-httponly.yaml
      - template: templates/vulnerabilities/generic-servlets/java-servlet-verbose-error-disclosure.yaml
  - template: templates/technologies/java-web/primefaces-resource-fingerprint.yaml
    subtemplates:
      - template: templates/exposures/sensitive-paths/jsf-faces-config-exposed.yaml
      - template: templates/exposures/sensitive-paths/jakarta-ee-descriptors-exposed.yaml
      - template: templates/exposures/error-pages/jakarta-faces-stacktrace-exposed.yaml
