id: java-modern-stacks-snapshot-workflow

info:
  name: Java Modern Stacks Snapshot Workflow
  author: scan-nuclei
  description: |
    Chains Quarkus and Micronaut fingerprints with a small set of follow-up checks
    (dev surface, common env leaks) when a strong technology signal matches.

workflows:
  - template: templates/technologies/quarkus/quarkus-stack-fingerprint.yaml
    subtemplates:
      - template: templates/misconfiguration/quarkus/quarkus-health-endpoints-exposed.yaml
      - template: templates/misconfiguration/java-apps/quarkus-dev-ui-surface-exposed.yaml
      - template: templates/misconfiguration/quarkus/quarkus-openapi-surface-exposed.yaml
      - template: templates/misconfiguration/quarkus/quarkus-metrics-endpoint-exposed.yaml
  - template: templates/technologies/micronaut/micronaut-signal-fingerprint.yaml
    subtemplates:
      - template: templates/misconfiguration/micronaut/micronaut-env-endpoint-exposed.yaml
      - template: templates/misconfiguration/micronaut/micronaut-management-endpoints-exposed.yaml
      - template: templates/misconfiguration/micronaut/micronaut-loggers-write-surface-exposed.yaml
      - template: templates/misconfiguration/micronaut/micronaut-refresh-write-surface-exposed.yaml
      - template: templates/misconfiguration/micronaut/micronaut-stop-write-surface-potential.yaml
      - template: templates/exposures/sensitive-paths/java-env-files-exposed.yaml
      - template: templates/vulnerabilities/micronaut/micronaut-beans-endpoint-exposed.yaml
      - template: templates/vulnerabilities/micronaut/micronaut-env-sensitive-keys-exposed.yaml
      - template: templates/vulnerabilities/micronaut/micronaut-routes-endpoint-exposed.yaml
