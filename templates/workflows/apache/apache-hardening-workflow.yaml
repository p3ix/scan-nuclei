      - template: templates/misconfiguration/apache/apache-http-to-https-redirect-missing.yaml
      - template: templates/misconfiguration/apache/apache-hsts-missing-on-https.yaml
      - template: templates/misconfiguration/apache/apache-hsts-weak-policy.yaml
      - template: templates/misconfiguration/apache/apache-cookie-secure-httponly-missing.yaml
      - template: templates/misconfiguration/apache/apache-samesite-none-without-secure.yaml
      - template: templates/misconfiguration/apache/apache-redirect-host-header-trust-bypass.yaml
      - template: templates/misconfiguration/apache/apache-internal-backend-location-disclosure.yaml
