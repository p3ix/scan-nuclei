      - template: templates/misconfiguration/apache/apache-status-json-exposed.yaml
      - template: templates/misconfiguration/apache/apache-server-info-exposed.yaml
      - template: templates/misconfiguration/apache/apache-info-module-signature-exposed.yaml
      - template: templates/misconfiguration/apache/apache-balancer-manager-exposed.yaml
      - template: templates/misconfiguration/apache/apache-jk-status-exposed.yaml
      - template: templates/misconfiguration/apache/apache-directory-listing-exposed.yaml
      - template: templates/misconfiguration/apache/apache-ht-files-exposed.yaml
      - template: templates/misconfiguration/apache/apache-basic-auth-surface-exposed.yaml
      - template: templates/misconfiguration/apache/apache-digest-auth-surface-exposed.yaml
      - template: templates/misconfiguration/apache/apache-alias-paths-exposed.yaml
      - template: templates/misconfiguration/apache/apache-scriptalias-paths-exposed.yaml
