id: tomcat-version-priority-workflow

info:
  name: Tomcat Version Priority Workflow
  author: scan-nuclei
  description: Runs actionable Tomcat checks after detecting Tomcat version/fingerprint indicators.

workflows:
  - template: templates/technologies/tomcat/tomcat-version-hint-fingerprint.yaml
    subtemplates:
      - template: templates/misconfiguration/tomcat/tomcat-manager-html-exposed.yaml
      - template: templates/misconfiguration/tomcat/tomcat-host-manager-html-exposed.yaml
      - template: templates/misconfiguration/tomcat/tomcat-manager-script-endpoint-exposed.yaml
      - template: templates/misconfiguration/tomcat/tomcat-manager-jmxproxy-exposed.yaml
      - template: templates/exposures/sensitive-paths/tomcat-manager-status-endpoint-exposed.yaml
      - template: templates/default-logins/tomcat-manager/tomcat-manager-default-credentials.yaml
      - template: templates/default-logins/apache-tomcat/apache-tomcat-admin-default-credentials.yaml
      - template: templates/exposures/sensitive-paths/tomcat-examples-docs-exposed.yaml
      - template: templates/exposures/sensitive-paths/tomcat-users-xml-exposed.yaml
      - template: templates/exposures/sensitive-paths/tomcat-context-xml-exposed.yaml
      - template: templates/exposures/sensitive-paths/tomcat-server-xml-exposed.yaml
      - template: templates/exposures/sensitive-paths/tomcat-catalina-properties-exposed.yaml
      - template: templates/exposures/sensitive-paths/tomcat-webapps-root-listing-exposed.yaml
      - template: templates/exposures/sensitive-paths/web-inf-web-xml-exposed.yaml
      - tags: potential
      - template: templates/cves/tomcat/CVE-2017-12617-tomcat-put-jsp-upload-potential.yaml
      - template: templates/cves/tomcat/CVE-2019-0232-tomcat-cgi-rce-potential.yaml
      - template: templates/cves/tomcat/CVE-2020-1938-tomcat-ghostcat-potential.yaml
      - template: templates/cves/tomcat/CVE-2020-9484-tomcat-session-deserialization-rce-potential.yaml
