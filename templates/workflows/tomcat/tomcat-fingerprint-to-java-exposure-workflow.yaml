id: tomcat-fingerprint-to-java-exposure-workflow

info:
  name: Tomcat Fingerprint to Java Exposure Workflow
  author: scan-nuclei
  description: Chains Java/Spring exposure checks when Tomcat technology is detected.

workflows:
  - template: templates/technologies/tomcat/tomcat-server-header-fingerprint.yaml
    subtemplates:
      - template: templates/exposures/openapi-json-exposed.yaml
      - template: templates/exposures/openapi-yaml-exposed.yaml
      - template: templates/exposures/wadl-exposed.yaml
      - template: templates/exposures/wsdl-xsd-exposed.yaml
      - template: templates/exposures/sensitive-paths/actuator-env-exposed.yaml
      - template: templates/exposures/sensitive-paths/actuator-heapdump-exposed.yaml
      - template: templates/exposures/sensitive-paths/application-properties-exposed.yaml
      - template: templates/exposures/sensitive-paths/application-yaml-exposed.yaml
      - template: templates/exposures/sensitive-paths/log-config-exposed.yaml
