id: apache-default-page-fingerprint

info:
  name: Apache Default Page Fingerprint
  author: scan-nuclei
  severity: info
  description: |
    Detects Apache default landing pages that typically indicate fresh
    or minimally customized HTTPD deployments.
  tags:
    - tech
    - apache
    - httpd
    - fingerprint
    - default-page

http:
  - method: GET
    path:
      - "{{BaseURL}}/"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)<title>Apache2 Ubuntu Default Page"
          - "(?i)<title>Test Page for the Apache HTTP Server"
          - "(?i)It works!"
          - "(?i)Apache HTTP Server Test Page"
