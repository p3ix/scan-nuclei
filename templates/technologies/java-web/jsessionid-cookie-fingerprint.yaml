id: jsessionid-cookie-fingerprint

info:
  name: Java Web Stack via JSESSIONID Cookie
  author: scan-nuclei
  severity: info
  description: |
    Detects likely Java servlet-based stacks via JSESSIONID session cookie.
    Informational fingerprint only.
  tags:
    - tech
    - java
    - servlet
    - jsessionid
    - fingerprint

http:
  - method: GET
    path:
      - "{{BaseURL}}/"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 302
          - 401
          - 403
          - 404
          - 500
      - type: regex
        part: header
        regex:
          - "(?i)set-cookie:\\s*JSESSIONID="
