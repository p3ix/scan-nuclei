id: tomcat-default-error-page-fingerprint

info:
  name: Apache Tomcat Default Error Page Fingerprint
  author: scan-nuclei
  severity: info
  description: |
    Detects default Tomcat error signatures that disclose servlet container
    technology and often version hints.
  tags:
    - tech
    - tomcat
    - fingerprint
    - error-page

http:
  - method: GET
    path:
      - "{{BaseURL}}/this-path-should-not-exist-nuclei-tomcat-404"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 404
          - 500
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)<title>Apache Tomcat(/[0-9.]+)? - Error report</title>"
          - "(?i)<h1>HTTP Status 404"
          - "(?i)org\\.apache\\.catalina"
          - "(?i)Apache Tomcat/[0-9.]+"
