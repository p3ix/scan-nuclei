id: undertow-default-page-fingerprint

info:
  name: Undertow Default Page Fingerprint
  author: scan-nuclei
  severity: info
  description: |
    Detects Undertow or WildFly default landing content that often indicates a
    fresh or minimally customized application server deployment.
  tags:
    - tech
    - wildfly
    - undertow
    - fingerprint
    - default-page

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
      - "{{BaseURL}}/welcome-content/"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        condition: or
        regex:
          - "(?i)Welcome to WildFly"
          - "(?i)Your WildFly is running"
          - "(?i)Welcome to Undertow"
          - "(?i)To replace this page simply deploy your own war"
