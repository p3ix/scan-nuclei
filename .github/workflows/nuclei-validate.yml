name: Validate Nuclei templates

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      # Pin a released tag so CI is reproducible; review quarterly or when you need
      # new Nuclei DSL features. See: https://github.com/projectdiscovery/nuclei/releases
      - name: Install Nuclei
        run: go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@v3.8.0

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Validate all templates
        run: nuclei -validate -t templates/

      - name: Run repository structural checks
        run: scripts/check-repo.sh

      - name: Run HTTP regression fixtures
        run: python3 scripts/run-http-regression.py
