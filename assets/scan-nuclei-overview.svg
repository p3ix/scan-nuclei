  <text x="120" y="226" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" letter-spacing="0">Focused on Java, Apache HTTPD, Tomcat, WildFly/JBoss, Spring, APIs, DevOps, observability, and exposed infrastructure.</text>
